name: Deterministic CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate package and skill structure
        run: python evals/validate_package.py

      - name: Validate committed visual prototypes
        run: python skills/code-territory-guide/scripts/validate_visual_prototype.py --committed

      - name: Validate behavioral manifest
        run: python evals/validate_manifest.py

      - name: Validate recorded evidence
        run: python evals/validate_records.py

      - name: Run deterministic tests
        run: python -m unittest discover -s evals/tests -v
